<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trials of Judah</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a0f0a;
      color: #d4c5b0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .login-card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 380px;
      width: 100%;
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 12px;
      background: rgba(201,168,76,0.03);
    }
    .title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 1px;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #8a7a60;
      margin-bottom: 2rem;
    }
    .input-wrap {
      margin-bottom: 1rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      color: #d4c5b0;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #c9a84c;
    }
    input[type="password"]::placeholder {
      color: #5a4f40;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 1px;
      background: #c9a84c;
      color: #1a0f0a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #d4b65c; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: #c0392b;
      font-size: 0.85rem;
      margin-top: 1rem;
      min-height: 1.2em;
    }
    .verse {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #5a4f40;
      font-style: italic;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="title">Trials of Judah</div>
    <div class="subtitle">Enter the access code to continue</div>
    <form id="loginForm">
      <div class="input-wrap">
        <input type="password" id="code" placeholder="Access code" autocomplete="off" autofocus>
      </div>
      <button type="submit">ENTER</button>
    </form>
    <div class="error" id="error"></div>
    <div class="verse">"Ask, and it shall be given you; seek, and ye shall find; knock, and it shall be opened unto you." — Matthew 7:7</div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var code = document.getElementById('code').value;
      var errEl = document.getElementById('error');
      var btn = this.querySelector('button');
      if (!code) return;
      btn.disabled = true;
      btn.textContent = 'VERIFYING...';
      errEl.textContent = '';
      try {
        var res = await fetch('/api/auth', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({code: code}),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          var data = await res.json();
          errEl.textContent = data.error || 'Invalid access code';
        }
      } catch (err) {
        errEl.textContent = 'Connection error — try again';
      }
      btn.disabled = false;
      btn.textContent = 'ENTER';
    });
  </script>
</body>
</html>
